<body>

<!-- ── Header ───────────────────────────────────────────── -->
<h1>10MB Compressor</h1>
<p class="subtitle">Compress images, video, and audio to under 10MB. Drag files or use the picker — multiple files run simultaneously.</p>

<!-- ── Options ──────────────────────────────────────────── -->
<div id="options">
  <label for="methodSelect">Compression engine:</label>
  <select id="methodSelect">
    <option value="ffmpeg" selected>FFmpeg (fast — recommended)</option>
    <option value="browser">Browser built-in (slower, no install)</option>
  </select>
</div>

<!-- ── FFmpeg Status ─────────────────────────────────────── -->
<div id="ffstatus">FFmpeg: loading…</div>

<!-- ── Drop Zone ─────────────────────────────────────────── -->
<div id="dropzone">
  <div class="drop-icon">📁</div>
  <p>Drag &amp; drop image, video, or audio files here</p>
  <label id="fileBtn" for="fileInput">Choose Files</label>
  <input type="file" id="fileInput" accept="image/*,video/*,audio/*" multiple>
</div>

<!-- ── Active Jobs ───────────────────────────────────────── -->
<div id="jobs"></div>

<hr>

<!-- ── History ──────────────────────────────────────────── -->
<div id="historyHeader">
  <h2>History</h2>
  <button id="clearBtn">Clear History</button>
</div>
<p id="noHistory">No history yet.</p>
<table id="historyTable" style="display:none">
  <thead>
    <tr>
      <th>Preview</th>
      <th>Filename</th>
      <th>Original</th>
      <th>Compressed</th>
      <th>Date</th>
      <th>Download</th>
    </tr>
  </thead>
  <tbody id="historyBody"></tbody>
</table>

<script type="module">
// ── FFMPEG SETUP ────────────────────────────────────────────
import { FFmpeg } from './index.js';
import { fetchFile, toBlobURL } from './ff.js';

const FF_CDN  = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm/';
const FF_WORK = 'worker.js';

let ff = null;
let ffReady = false;
const ffQueue = [];
let ffBusy = false;

async function initFFmpeg() {
  setFFStatus('loading', 'FFmpeg: loading…');
  try {
    ff = new FFmpeg();
    // toBlobURL fetches the script and serves it as a same-origin blob,
    // bypassing the Worker cross-origin restriction on hosted pages.
    await ff.load({
      coreURL:   await toBlobURL(FF_CDN + 'ffmpeg-core.js',  'text/javascript'),
      wasmURL:   await toBlobURL(FF_CDN + 'ffmpeg-core.wasm','application/wasm'),
      workerURL: await toBlobURL(FF_WORK,                    'text/javascript'),
    });
    ffReady = true;
    setFFStatus('ready', 'FFmpeg: ready ✓');
    drainQueue();
  } catch(e) {
    setFFStatus('error', 'FFmpeg failed: ' + e.message + '. Switch engine to "Browser built-in".');
  }
}

function setFFStatus(cls, msg) {
  const el = document.getElementById('ffstatus');
  el.className = cls;
  el.textContent = msg;
}

function drainQueue() {
  if (ffBusy || ffQueue.length === 0) return;
  ffBusy = true;
  const next = ffQueue.shift();
  next().catch(()=>{}).finally(() => { ffBusy = false; drainQueue(); });
}
function enqueueFF(fn) { ffQueue.push(fn); if (ffReady) drainQueue(); }

// ── METHOD HELPER ───────────────────────────────────────────
function method() { return document.getElementById('methodSelect').value; }

// ── DROP ZONE ───────────────────────────────────────────────
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  for (const f of files) processFile(f);
}

// ── JOB CARDS ──────────────────────────────────────────────
let jc = 0;
function createCard(file) {
  const id = 'job' + (++jc);
  const div = document.createElement('div');
  div.id = id;
  div.className = 'job-card';
  div.innerHTML =
    '<div class="job-name">' + esc(file.name) + '</div>' +
    '<div class="job-size">' + fmt(file.size) + '</div>' +
    '<div class="job-status">Queued…</div>' +
    '<progress value="0" max="100"></progress>' +
    '<div class="preview-wrap"></div>';
  document.getElementById('jobs').prepend(div);
  return id;
}
function jS(id, html, cls='') {
  const el = document.querySelector('#'+id+' .job-status');
  if (el) { el.innerHTML = html; el.className = 'job-status ' + cls; }
}
function jP(id, v) {
  const el = document.querySelector('#'+id+' progress');
  if (el) el.value = v;
}
function jDone(id, blob, outName, mediaType, origFile) {
  jP(id, 100);
  jS(id, '✓ Done — ' + fmt(origFile.size) + ' → ' + fmt(blob.size), 'done');
  const card = document.getElementById(id);
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = outName; a.textContent = '⬇ Download ' + outName;
  a.className = 'dl-btn';
  card.appendChild(a);
  appendPreview(card.querySelector('.preview-wrap'), url, mediaType, false);
  persistHistory(blob, outName, mediaType, origFile.size, blob.size);
}
function jErr(id, msg) {
  jS(id, msg, 'error');
  const el = document.querySelector('#'+id+' progress'); if (el) el.remove();
}

// ── DISPATCH ────────────────────────────────────────────────
function processFile(file) {
  const t = file.type;
  if      (t.startsWith('image/')) compressImage(file);
  else if (t.startsWith('video/')) compressVideo(file);
  else if (t.startsWith('audio/')) compressAudio(file);
  else { const id = createCard(file); jErr(id, 'Unsupported type: ' + (t||'unknown')); }
}

// ── IMAGE — binary-search quality ───────────────────────────
function compressImage(file) {
  const id = createCard(file);
  if (file.size <= MAX) { jErr(id, 'Already under 10MB (' + fmt(file.size) + '). No compression needed.'); return; }
  jS(id, 'Loading…'); jP(id, 5);
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    URL.revokeObjectURL(url);
    const canvas = document.createElement('canvas');
    let scale = 1.0;
    function tryCompress() {
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      let lo = 0.05, hi = 0.95, best = null, pass = 0;
      const PASSES = 9;
      while (lo <= hi && pass++ < PASSES) {
        const mid = (lo + hi) / 2;
        const d   = canvas.toDataURL('image/jpeg', mid);
        const bytes = Math.round((d.length - 'data:image/jpeg;base64,'.length) * 3/4);
        jP(id, Math.round(10 + (pass/PASSES)*80));
        jS(id, 'Pass ' + pass + ' — q=' + Math.round(mid*100) + '% scale=' + Math.round(scale*100) + '% → ' + fmt(bytes));
        if (bytes <= MAX) { best = { d, bytes, q: mid }; lo = mid + 0.02; }
        else              { hi  = mid - 0.02; }
      }
      if (best) {
        jDone(id, dataURLToBlob(best.d), stripExt(file.name)+'_compressed.jpg', 'image', file);
      } else {
        scale *= 0.65;
        if (scale < 0.04) { jErr(id, 'Cannot compress image below 10MB.'); return; }
        jS(id, 'Reducing scale to ' + Math.round(scale*100) + '%…');
        setTimeout(tryCompress, 0);
      }
    }
    tryCompress();
  };
  img.onerror = () => jErr(id, 'Could not load image.');
  img.src = url;
}

// ── VIDEO ───────────────────────────────────────────────────
function compressVideo(file) {
  if (method() === 'ffmpeg') compressVideoFF(file);
  else                        compressVideoMR(file);
}

async function compressVideoFF(file) {
  const id = createCard(file);
  if (file.size <= MAX) { jErr(id, 'Already under 10MB (' + fmt(file.size) + '). No compression needed.'); return; }
  jS(id, ffReady ? 'Queued for FFmpeg…' : 'Waiting for FFmpeg to load…');
  enqueueFF(async () => {
    jS(id, 'Writing file…'); jP(id, 3);
    const safe   = file.name.replace(/[^a-z0-9.]/gi,'_');
    const inName = 'in_'+id+'_'+safe, outName = 'out_'+id+'.mp4';
    await ff.writeFile(inName, await fetchFile(file));
    jP(id, 8);
    const duration = await probeDuration(inName) || (file.size / 500000);
    const totalBits = 9*1024*1024*8;
    const vbps = Math.max(50_000, Math.floor((totalBits/duration) - 64_000));
    jS(id, 'Encoding at ' + Math.round(vbps/1000) + ' kbps (~' + Math.round(duration) + 's)…');
    const onProg = ({ progress }) => {
      jP(id, Math.round(10 + progress*85));
      jS(id, 'Encoding… ' + Math.round(progress*100) + '%');
    };
    ff.on('progress', onProg);
    try {
      await ff.exec(['-i',inName,'-c:v','libx264','-b:v',Math.round(vbps/1000)+'k',
                     '-c:a','aac','-b:a','64k','-movflags','+faststart','-y',outName]);
    } catch(e) {
      await ff.exec(['-i',inName,'-c:v','libx264','-b:v',Math.round(vbps/1000)+'k',
                     '-vf','scale=iw/2:ih/2','-c:a','aac','-b:a','64k','-y',outName]);
    }
    ff.off('progress', onProg);
    const data = await ff.readFile(outName);
    await ff.deleteFile(inName); await ff.deleteFile(outName);
    jDone(id, new Blob([data.buffer],{type:'video/mp4'}), stripExt(file.name)+'_compressed.mp4', 'video', file);
  });
}

function compressVideoMR(file) {
  const id = createCard(file);
  if (!window.MediaRecorder) { jErr(id, 'MediaRecorder not available. Try Chrome.'); return; }
  if (file.size <= MAX) { jErr(id, 'Already under 10MB (' + fmt(file.size) + '). No compression needed.'); return; }
  jS(id, 'Loading video…'); jP(id, 2);
  const video = document.createElement('video');
  video.src = URL.createObjectURL(file); video.muted = true; video.playsInline = true;
  video.onloadedmetadata = () => {
    const dur    = video.duration;
    const targetBps = Math.min(Math.floor((9*1024*1024*8)/dur), 2_500_000);
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth||640; canvas.height = video.videoHeight||360;
    const stream = canvas.captureStream(30);
    try {
      const ac = new AudioContext(), src2 = ac.createMediaElementSource(video),
            dest = ac.createMediaStreamDestination();
      src2.connect(dest); src2.connect(ac.destination);
      dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));
    } catch(e) {}
    const mime   = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    const chunks = [];
    const rec    = new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:targetBps});
    rec.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    const t0 = Date.now();
    const tick = setInterval(()=>{
      const el=(Date.now()-t0)/1000;
      jP(id,Math.min(95,Math.round((el/dur)*90)+5));
      jS(id,'Encoding… ~'+Math.max(0,Math.round(dur-el))+'s left');
    },500);
    rec.onstop = () => {
      clearInterval(tick);
      jDone(id, new Blob(chunks,{type:mime}), stripExt(file.name)+'_compressed.webm', 'video', file);
    };
    video.onplay = () => {
      canvas.width=video.videoWidth||640; canvas.height=video.videoHeight||360;
      const ctx=canvas.getContext('2d');
      const draw=()=>{ if(!video.ended&&!video.paused){ctx.drawImage(video,0,0);requestAnimationFrame(draw);} };
      draw();
    };
    rec.start(100); video.play(); video.onended=()=>rec.stop();
  };
  video.onerror = () => jErr(id, 'Could not load video.');
}

// ── AUDIO ───────────────────────────────────────────────────
function compressAudio(file) {
  if (method() === 'ffmpeg') compressAudioFF(file);
  else                        compressAudioMR(file);
}

async function compressAudioFF(file) {
  const id = createCard(file);
  if (file.size <= MAX) { jErr(id, 'Already under 10MB (' + fmt(file.size) + '). No compression needed.'); return; }
  jS(id, ffReady ? 'Queued for FFmpeg…' : 'Waiting for FFmpeg to load…');
  enqueueFF(async () => {
    jS(id, 'Writing file…'); jP(id, 5);
    const safe   = file.name.replace(/[^a-z0-9.]/gi,'_');
    const inName = 'in_'+id+'_'+safe, outName = 'out_'+id+'.mp3';
    await ff.writeFile(inName, await fetchFile(file));
    jP(id, 10);
    const dur  = await probeDuration(inName) || (file.size/16000);
    const kbps = Math.min(Math.round((9*1024*1024*8)/(dur*1000)), 192);
    jS(id, 'Encoding at ' + kbps + ' kbps (~' + Math.round(dur) + 's)…');
    const onProg = ({ progress }) => {
      jP(id, Math.round(10 + progress*85));
      jS(id, 'Encoding… ' + Math.round(progress*100) + '%');
    };
    ff.on('progress', onProg);
    await ff.exec(['-i',inName,'-b:a',kbps+'k','-y',outName]);
    ff.off('progress', onProg);
    const data = await ff.readFile(outName);
    await ff.deleteFile(inName); await ff.deleteFile(outName);
    jDone(id, new Blob([data.buffer],{type:'audio/mpeg'}), stripExt(file.name)+'_compressed.mp3', 'audio', file);
  });
}

function compressAudioMR(file) {
  const id = createCard(file);
  if (!window.AudioContext||!window.MediaRecorder) { jErr(id,'Web Audio/MediaRecorder not available.'); return; }
  if (file.size <= MAX) { jErr(id, 'Already under 10MB (' + fmt(file.size) + '). No compression needed.'); return; }
  jS(id,'Decoding audio…'); jP(id,5);
  file.arrayBuffer().then(buf=>{
    const ac = new AudioContext();
    ac.decodeAudioData(buf, decoded=>{
      const dur  = decoded.duration;
      const bps  = Math.min(Math.floor((9*1024*1024*8)/dur), 128_000);
      const dest = ac.createMediaStreamDestination();
      const src2 = ac.createBufferSource(); src2.buffer=decoded; src2.connect(dest);
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
      const chunks=[]; const rec=new MediaRecorder(dest.stream,{mimeType:mime,audioBitsPerSecond:bps});
      rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
      const t0=Date.now();
      const tick=setInterval(()=>{
        const el=(Date.now()-t0)/1000;
        jP(id,Math.min(95,Math.round((el/dur)*85)+10));
        jS(id,'Encoding… ~'+Math.max(0,Math.round(dur-el))+'s left');
      },500);
      rec.onstop=()=>{ clearInterval(tick); jDone(id,new Blob(chunks,{type:mime}),stripExt(file.name)+'_compressed.webm','audio',file); };
      rec.start(100); src2.start(); src2.onended=()=>rec.stop();
    },()=>jErr(id,'Failed to decode audio.'));
  }).catch(()=>jErr(id,'Failed to read file.'));
}

// ── PROBE DURATION ──────────────────────────────────────────
async function probeDuration(filename) {
  return new Promise(resolve => {
    let dur = 0;
    const handler = ({ message }) => {
      const m = message.match(/Duration:\s*(\d+):(\d+):([\d.]+)/);
      if (m) dur = parseInt(m[1])*3600 + parseInt(m[2])*60 + parseFloat(m[3]);
    };
    ff.on('log', handler);
    ff.exec(['-i',filename,'-f','null','-']).catch(()=>{}).finally(()=>{
      ff.off('log', handler); resolve(dur);
    });
  });
}

// ── HISTORY ─────────────────────────────────────────────────
const HKEY = 'compressor_history_v2';
function loadHistory()        { try{return JSON.parse(localStorage.getItem(HKEY))||[];}catch(e){return[];} }
function saveHistoryList(l)   { try{localStorage.setItem(HKEY,JSON.stringify(l));}catch(e){console.warn('Storage full');} }

function persistHistory(blob, outName, mediaType, origSize, compSize) {
  const entry = {name:outName,mediaType,origSize,compSize,date:new Date().toLocaleString(),dataUrl:null};
  if (blob.size < 9*1024*1024) {
    const r=new FileReader(); r.onload=()=>{entry.dataUrl=r.result;pushEntry(entry);}; r.readAsDataURL(blob);
  } else { pushEntry(entry); }
}
function pushEntry(entry) {
  const l=loadHistory(); l.unshift(entry); saveHistoryList(l.slice(0,20)); renderHistory();
}
document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(!confirm('Clear all history?')) return;
  localStorage.removeItem(HKEY); renderHistory();
});

function renderHistory() {
  const list  = loadHistory();
  document.getElementById('noHistory').style.display    = list.length ? 'none' : '';
  document.getElementById('historyTable').style.display = list.length ? ''     : 'none';
  const tbody = document.getElementById('historyBody'); tbody.innerHTML='';
  for (const e of list) {
    const tr = document.createElement('tr');
    // Preview
    const tdP=document.createElement('td');
    if(e.dataUrl) appendPreview(tdP,e.dataUrl,e.mediaType,true); else tdP.textContent='—';
    tr.appendChild(tdP);
    [e.name, fmt(e.origSize), fmt(e.compSize), e.date].forEach(txt=>{
      const td=document.createElement('td'); td.textContent=txt; tr.appendChild(td);
    });
    const tdDl=document.createElement('td');
    if(e.dataUrl){
      const a=document.createElement('a'); a.href=e.dataUrl; a.download=e.name;
      a.textContent='Download'; a.className='dl-link'; tdDl.appendChild(a);
    } else { tdDl.textContent='N/A'; }
    tr.appendChild(tdDl); tbody.appendChild(tr);
  }
}

// ── PREVIEW ─────────────────────────────────────────────────
function appendPreview(container, src, mediaType, small) {
  if (mediaType==='image') {
    const img=document.createElement('img'); img.src=src; container.appendChild(img);
  } else if (mediaType==='video') {
    const v=document.createElement('video'); v.src=src; v.controls=true; container.appendChild(v);
  } else if (mediaType==='audio') {
    const a=document.createElement('audio'); a.src=src; a.controls=true; container.appendChild(a);
  }
}

// ── UTILS ────────────────────────────────────────────────────
const MAX = 10*1024*1024;
function fmt(b) {
  if(b==null)return'?';
  if(b>=1048576)return(b/1048576).toFixed(2)+' MB';
  if(b>=1024)return(b/1024).toFixed(1)+' KB';
  return b+' B';
}
function stripExt(n)   { return n.replace(/\.[^.]+$/,''); }
function esc(s)        { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dataURLToBlob(d) {
  const [h,data]=d.split(','), mime=h.match(/:(.*?);/)[1];
  const bin=atob(data), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

// ── INIT ─────────────────────────────────────────────────────
renderHistory();
initFFmpeg();
</script>
</body>
</html>
